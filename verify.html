<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Баталгаажуулалт | TANK CLUB</title>
    <style>
        body { background-color: #0f0f0f; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: white; }
        .verify-card { width: 320px; background: #1a1a1a; border-radius: 25px; padding: 30px; text-align: center; border: 2px solid #2ecc71; box-shadow: 0 0 20px rgba(46, 204, 113, 0.2); }
        .status-icon { font-size: 60px; color: #2ecc71; margin-bottom: 15px; }
        .status-text { font-size: 18px; font-weight: bold; color: #2ecc71; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 25px; }
        .info-box { text-align: left; background: #222; padding: 15px; border-radius: 15px; border: 1px solid #333; }
        .label { color: #777; font-size: 11px; text-transform: uppercase; margin-top: 10px; }
        .value { color: #ddd; font-size: 15px; font-weight: 500; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .logo { color: #d4af37; font-weight: 900; margin-top: 20px; font-size: 14px; }
    </style>
</head>
<body>

<div class="verify-card">
    <div class="status-icon">✓</div>
    <div class="status-text">Албан ёсны гишүүн мөн</div>

    <div class="info-box">
        <div class="label">Гишүүний нэр</div>
        <div id="res-name" class="value">---</div>

        <div class="label">Машины брэнд / Дугаар</div>
        <div id="res-car" class="value">GWM TANK</div>

        <div class="label">Системийн ID</div>
        <div id="res-id" class="value">---</div>
    </div>

    <div class="logo">TANK CLUB MONGOLIA</div>
</div>

<script>
    // URL-аас мэдээллийг салгаж авах
    const urlParams = new URLSearchParams(window.location.search);
    document.getElementById('res-name').innerText = urlParams.get('name') || "Тодорхойгүй";
    document.getElementById('res-id').innerText = urlParams.get('id') || "------";
    
    // Хэрэв машин болон дугаар линкээр ирсэн бол харуулна
    const carInfo = urlParams.get('car') || "GWM TANK 300";
    document.getElementById('res-car').innerText = carInfo;
</script>

</body>
</html>
