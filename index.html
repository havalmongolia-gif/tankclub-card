<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tank Club Virtual Card</title>
    <!-- QR код үүсгэгч сан -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            background-color: #0f0f0f;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        .card {
            width: 320px;
            background: linear-gradient(145deg, #1a1a1a, #000000);
            border-radius: 20px;
            border: 1px solid #333;
            color: white;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            position: relative;
            overflow: hidden;
        }
        .logo {
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 2px;
            color: #d4af37; /* Алтлаг өнгө */
            border-bottom: 2px solid #d4af37;
            display: inline-block;
            margin-bottom: 25px;
        }
        .info-label {
            color: #777;
            font-size: 11px;
            text-transform: uppercase;
            margin-top: 12px;
            letter-spacing: 1px;
        }
        .info-value {
            font-size: 17px;
            font-weight: 500;
            margin-bottom: 4px;
        }
        .row {
            display: flex;
            justify-content: space-between;
        }
        .qr-container {
            background: white;
            padding: 10px;
            border-radius: 12px;
            width: 140px;
            height: 140px;
            margin: 30px auto 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 10px;
            color: #444;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="logo">TANK CLUB</div>
    
    <div class="info-label">Гишүүний нэр</div>
    <div class="info-value">Бат-Эрдэнэ</div>

    <div class="info-label">Утасны дугаар</div>
    <div class="info-value">+976 9911-XXXX</div>

    <div class="row">
        <div>
            <div class="info-label">Загвар</div>
            <div class="info-value">Tank 700</div>
        </div>
        <div>
            <div class="info-label">Улсын дугаар</div>
            <div class="info-value">0000 УБА</div>
        </div>
    </div>

    <!-- QR Код энд гарч ирнэ -->
    <div class="qr-container" id="qrcode"></div>
    
    <div class="footer">OFFICIAL MEMBER • 2026</div>
</div>

<script>
    // QR кодыг үүсгэх функц
    // text хэсэгт тухайн хүний ID эсвэл линкийг оруулна
    new QRCode(document.getElementById("qrcode"), {
        text: "TANK-MEMBER-001", 
        width: 140,
        height: 140,
        colorDark : "#000000",
        colorLight : "#ffffff",
        correctLevel : QRCode.CorrectLevel.H
    });
</script>

</body>
</html>
