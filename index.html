<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tank Club Card</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { background-color: #0f0f0f; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; color: white; }
        .card { width: 310px; background: linear-gradient(145deg, #1a1a1a, #050505); border-radius: 20px; border: 1px solid #d4af37; padding: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.9); text-align: left; }
        .logo { font-size: 20px; font-weight: 900; color: #d4af37; border-bottom: 1px solid #d4af37; margin-bottom: 20px; padding-bottom: 5px; }
        .info-label { color: #888; font-size: 10px; text-transform: uppercase; margin-top: 15px; }
        .info-value { font-size: 16px; font-weight: 600; color: #eee; }
        .qr-container { background: white; padding: 12px; border-radius: 15px; width: 140px; height: 140px; margin: 25px auto 0; display: flex; justify-content: center; align-items: center; }
    </style>
</head>
<body>

<div class="card">
    <div class="logo">TANK CLUB MONGOLIA</div>
    
    <div class="info-label">Гишүүний нэр</div>
    <div id="user-name" class="info-value">Түр хүлээнэ үү...</div>

    <div class="info-label">Telegram ID</div>
    <div id="user-id" class="info-value">-------</div>

    <div class="qr-container" id="qrcode"></div>
    <div style="text-align:center; font-size: 9px; color: #555; margin-top: 15px; letter-spacing: 2px;">OFFICIAL VIRTUAL MEMBERSHIP</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    function initApp() {
        const user = tg.initDataUnsafe?.user;

        if (user && user.id) {
            const fullName = (user.first_name || "") + " " + (user.last_name || "");
            document.getElementById('user-name').innerText = fullName;
            document.getElementById('user-id').innerText = user.id;

            // QR КОДЫГ ЛИНК БОЛГОЖ ӨӨРЧЛӨХ ХЭСЭГ:
            // Энэ линк нь таны үүсгэсэн verify.html рүү мэдээллийг дамжуулж үсэрнэ.
            const verifyLink = "https://havalmongolia-gif.github.io/tankclub-card/verify.html?id=" + user.id + 
                               "&name=" + encodeURIComponent(fullName);

            new QRCode(document.getElementById("qrcode"), {
                text: verifyLink,
                width: 140,
                height: 140,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
        } else {
            document.getElementById('user-name').innerText = "Мэдээлэл олдсонгүй";
        }
    }

    setTimeout(initApp, 500);
</script>

</body>
</html>
